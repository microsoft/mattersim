name: Build and Test with Mamba

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Primary coverage: the floor version pinned in environment.yaml /
        # pyproject.toml, plus one current Python on Linux to catch
        # forward-compat regressions in dependencies.
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12']
        # Smoke-test on macOS with the pinned Python only — catches
        # platform-specific build/import issues without paying for a full
        # OS x Python matrix on expensive macOS runners.
        include:
          - os: macos-latest
            python-version: '3.10'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Update environment.yaml with Python ${{ matrix.python-version }}
      run: |
        sed -i.bak "s/- python=3.10/- python=${{ matrix.python-version }}/" environment.yaml

    - name: Set up Micromamba
      uses: mamba-org/setup-micromamba@v1
      with:
        micromamba-version: 'latest'
        environment-file: environment.yaml
        init-shell: >-
          bash
        cache-environment: true
        post-cleanup: 'all'

    - name: Install package and test dependencies
      shell: bash -l {0}
      run: |
        uv pip install ".[dev]"

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -v tests --disable-warnings
